# =============================================
# CLMS Nginx Configuration for Live Server
# =============================================
# Save as: /etc/nginx/sites-available/clms
# Then: sudo ln -s /etc/nginx/sites-available/clms /etc/nginx/sites-enabled/
# Test: sudo nginx -t
# Reload: sudo systemctl reload nginx
# =============================================

server {
    listen 80;
    listen [::]:80;
    server_name cslweb.teleconsystems.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cslweb.teleconsystems.com;
    
    # SSL Certificate paths (update these with your actual cert paths)
    ssl_certificate /etc/ssl/certs/your-cert.crt;
    ssl_certificate_key /etc/ssl/private/your-key.key;
    
    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Document root - adjust path to match your deployment
    root /var/www/clms;
    index index.php index.html;
    
    # =============================================
    # PHP-FPM Configuration
    # =============================================
    location ~ \.php$ {
        include fastcgi_params;
        
        # PHP-FPM socket - adjust version (php8.1-fpm, php8.2-fpm, etc.)
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
        
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        # Increase timeouts for longer operations
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        
        # Buffer settings
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        
        # Prevent fastcgi from caching
        fastcgi_cache off;

        # Disable caching at proxy/browser level for PHP scripts
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires off;
    }
    
    # =============================================
    # Static Files - Caching
    # =============================================
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # =============================================
    # Security Headers
    # =============================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # =============================================
    # URL Rewriting for CLMS
    # =============================================
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # API routing
    location /ui3/api/ {
        try_files $uri $uri/ /ui3/api/index.php?$query_string;
    }
    
    # =============================================
    # Deny Access to Sensitive Files
    # =============================================
    location ~ /\.(?!well-known) {
        access_log off;
        log_not_found off;
        return 404;
    }
    
    location ~* /(?:uploads|files)/.*\.php$ {
        deny all;
    }
    
    # =============================================
    # Logging
    # =============================================
    access_log /var/log/nginx/clms-access.log;
    error_log /var/log/nginx/clms-error.log;
}

